# @package _global_
defaults:
  - override /hydra/launcher: submitit_slurm
  - _self_

wandb:
  mode: online

hydra:
  launcher:
    submitit_folder: ${hydra.run.dir}/.submitit/%j
    _target_: hydra_plugins.hydra_submitit_launcher.submitit_launcher.SlurmLauncher

    timeout_min: 1200
    partition: gpu

    gpus_per_task: 1 
    tasks_per_node: 1   
    nodes: 1

    cpus_per_task: 16   
    mem_gb: 15
    name: ${hydra.job.name}
    array_parallelism: 16
    max_num_timeout: 0

    setup:
      - source ~/miniconda3/etc/profile.d/conda.sh && conda activate gfp
